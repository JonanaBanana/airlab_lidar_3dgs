# Launch configuration
# Edit paths and topic names here to match your system.

# Output directory for saved data (data_saver_launch)
output_dir: /home/airlab/dataset/liga_splat_dataset

# Output directory for rosbag recordings (record_bag_launch)
bag_output_dir: /home/airlab/dataset/liga_splat_bags

# ROS topic names
lidar_topic: /isaacsim/lidar
odom_topic: /isaacsim/odom
image_topic: /isaacsim/rgb

# Image saving
image_save_interval: 10   # save every Nth image
image_prefix: frame       # prefix for saved images (e.g. frame_0001.png)

# Odometry saving
odom_save_interval: 1     # save every Nth odometry message

# Point cloud parameters
leaf_size: 0.03           # voxel downsampling leaf size (metres)
max_path_length: 10000    # max number of poses kept in path

# Accumulator parameters
accumulator_max_points: 500000       # downsample + publish when accumulator reaches this size
accumulator_publish_interval: 100    # also publish every N lidar frames (0 = disabled)

# GlobalProcessor parameters
global_downsample_interval: 5        # downsample global cloud every N received batches
global_max_points: 5000000           # hard cap: triggers 2x leaf aggressive downsample if exceeded

# TF frame
frame_id: World
